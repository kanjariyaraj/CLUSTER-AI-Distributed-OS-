Section "Device"
  Identifier  "Card0"
  Driver      "modesetting"
EndSection

Section "Screen"
  Identifier  "Screen0"
  Device      "Card0"
  DefaultDepth 24
  SubSection "Display"
    Depth 24
    Modes "1280x800" "1024x768" "800x600"
  EndSubSection
EndSection

Section "ServerFlags"
  Option "DontVTSwitch" "true"
  Option "AllowMouseOpenFail" "true"
EndSection
