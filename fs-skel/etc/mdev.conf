# Device permissions for mdev
# Format: <device> <uid>:<gid> <octal-permissions>
null root:root 0666
zero root:root 0666
random root:root 0666
urandom root:root 0666
tty root:root 0666
tty0 root:root 0620
tty1 root:root 0620
tty2 root:root 0620
tty3 root:root 0620
tty4 root:root 0620
tty5 root:root 0620
tty6 root:root 0620
console root:root 0600
pts root:root 0666
# Input devices (keyboard, mouse, tablet)
input/.* root:root 0660
mice root:root 0660
mouse.* root:root 0660
event.* root:root 0660
